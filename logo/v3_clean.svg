<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <!-- TikTok-inspired cyan glow -->
    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Pink glow offset -->
    <filter id="pinkGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Gradient for the diamond border -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#25F4EE"/>
      <stop offset="50%" style="stop-color:#FE2C55"/>
      <stop offset="100%" style="stop-color:#25F4EE"/>
    </linearGradient>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e0e0"/>
    </linearGradient>
    <!-- Red outline gradient -->
    <linearGradient id="redOutline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FE2C55"/>
      <stop offset="50%" style="stop-color:#FF3366"/>
      <stop offset="100%" style="stop-color:#FE2C55"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="url(#bgGrad)"/>

  <!-- Diamond border frame -->
  <polygon points="300,40 560,300 300,560 40,300" fill="none" stroke="url(#borderGrad)" stroke-width="4" opacity="0.6"/>
  <polygon points="300,55 545,300 300,545 55,300" fill="none" stroke="url(#borderGrad)" stroke-width="2" opacity="0.3"/>

  <!-- TikTok musical note - stylized, floating above the T -->
  <g transform="translate(340, 120) scale(1.2)" opacity="0.9">
    <!-- Note stem -->
    <path d="M 30 0 L 30 70 Q 30 80 22 82 L 12 84 Q 0 86 -8 76 Q -16 64 -8 52 Q 0 42 12 46 L 22 50 L 22 10 L 42 6 L 42 0 Z"
          fill="#25F4EE" filter="url(#cyanGlow)"/>
    <!-- Offset shadow for 3D effect -->
    <path d="M 33 3 L 33 73 Q 33 83 25 85 L 15 87 Q 3 89 -5 79 Q -13 67 -5 55 Q 3 45 15 49 L 25 53 L 25 13 L 45 9 L 45 3 Z"
          fill="#FE2C55" filter="url(#pinkGlow)" opacity="0.7"/>
  </g>

  <!-- Cyan glow behind TOK (offset left) -->
  <text x="305" y="370" text-anchor="middle" font-family="Arial Black, Helvetica, sans-serif"
        font-size="180" font-weight="900" fill="#25F4EE" opacity="0.3" filter="url(#cyanGlow)"
        letter-spacing="-8">TOK</text>

  <!-- Pink glow behind TOK (offset right) -->
  <text x="315" y="370" text-anchor="middle" font-family="Arial Black, Helvetica, sans-serif"
        font-size="180" font-weight="900" fill="#FE2C55" opacity="0.3" filter="url(#pinkGlow)"
        letter-spacing="-8">TOK</text>

  <!-- Main TOK text with red outline -->
  <text x="310" y="370" text-anchor="middle" font-family="Arial Black, Helvetica, sans-serif"
        font-size="180" font-weight="900" fill="url(#textGrad)" stroke="url(#redOutline)"
        stroke-width="4" letter-spacing="-8">TOK</text>

  <!-- Tagline -->
  <text x="310" y="440" text-anchor="middle" font-family="Helvetica, Arial, sans-serif"
        font-size="22" font-weight="700" fill="#25F4EE" letter-spacing="8" opacity="0.9">TIKTOK AGENCY</text>

  <!-- Decorative dots -->
  <circle cx="200" cy="480" r="4" fill="#25F4EE" opacity="0.7"/>
  <circle cx="220" cy="480" r="3" fill="#FE2C55" opacity="0.7"/>
  <circle cx="238" cy="480" r="2" fill="#ffffff" opacity="0.5"/>
  <circle cx="382" cy="480" r="2" fill="#ffffff" opacity="0.5"/>
  <circle cx="400" cy="480" r="3" fill="#FE2C55" opacity="0.7"/>
  <circle cx="420" cy="480" r="4" fill="#25F4EE" opacity="0.7"/>

  <!-- Corner accents -->
  <line x1="80" y1="80" x2="120" y2="80" stroke="#25F4EE" stroke-width="2" opacity="0.5"/>
  <line x1="80" y1="80" x2="80" y2="120" stroke="#25F4EE" stroke-width="2" opacity="0.5"/>
  <line x1="520" y1="80" x2="480" y2="80" stroke="#FE2C55" stroke-width="2" opacity="0.5"/>
  <line x1="520" y1="80" x2="520" y2="120" stroke="#FE2C55" stroke-width="2" opacity="0.5"/>
  <line x1="80" y1="520" x2="120" y2="520" stroke="#FE2C55" stroke-width="2" opacity="0.5"/>
  <line x1="80" y1="520" x2="80" y2="480" stroke="#FE2C55" stroke-width="2" opacity="0.5"/>
  <line x1="520" y1="520" x2="480" y2="520" stroke="#25F4EE" stroke-width="2" opacity="0.5"/>
  <line x1="520" y1="520" x2="520" y2="480" stroke="#25F4EE" stroke-width="2" opacity="0.5"/>
</svg>