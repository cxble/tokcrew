<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D0D"/>
      <stop offset="100%" style="stop-color:#1A0A1A"/>
    </linearGradient>
    <linearGradient id="cyanText" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#25F4EE"/>
      <stop offset="100%" style="stop-color:#00D4D4"/>
    </linearGradient>
    <linearGradient id="pinkText" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FE2C55"/>
      <stop offset="100%" style="stop-color:#FF4477"/>
    </linearGradient>
    <linearGradient id="whiteText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E8E8E8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="url(#bg2)"/>

  <!-- Hexagon frame -->
  <polygon points="300,30 530,165 530,435 300,570 70,435 70,165"
           fill="none" stroke="#25F4EE" stroke-width="3" opacity="0.4"/>
  <polygon points="300,45 518,170 518,430 300,555 82,430 82,170"
           fill="none" stroke="#FE2C55" stroke-width="1.5" opacity="0.3"/>

  <!-- Sound wave bars on left -->
  <g opacity="0.6">
    <rect x="60" y="280" width="4" height="40" rx="2" fill="#25F4EE"/>
    <rect x="50" y="270" width="4" height="60" rx="2" fill="#25F4EE" opacity="0.7"/>
    <rect x="40" y="285" width="4" height="30" rx="2" fill="#25F4EE" opacity="0.5"/>
  </g>
  <!-- Sound wave bars on right -->
  <g opacity="0.6">
    <rect x="536" y="280" width="4" height="40" rx="2" fill="#FE2C55"/>
    <rect x="546" y="270" width="4" height="60" rx="2" fill="#FE2C55" opacity="0.7"/>
    <rect x="556" y="285" width="4" height="30" rx="2" fill="#FE2C55" opacity="0.5"/>
  </g>

  <!-- Cyan offset shadow -->
  <text x="294" y="350" text-anchor="middle"
        font-family="Arial Black, Helvetica, sans-serif"
        font-size="170" font-weight="900"
        fill="url(#cyanText)" opacity="0.35"
        letter-spacing="-6">TOK</text>

  <!-- Pink offset shadow -->
  <text x="326" y="350" text-anchor="middle"
        font-family="Arial Black, Helvetica, sans-serif"
        font-size="170" font-weight="900"
        fill="url(#pinkText)" opacity="0.35"
        letter-spacing="-6">TOK</text>

  <!-- Main white text -->
  <text x="310" y="350" text-anchor="middle"
        font-family="Arial Black, Helvetica, sans-serif"
        font-size="170" font-weight="900"
        fill="url(#whiteText)"
        letter-spacing="-6">TOK</text>

  <!-- Stylized play button / TikTok note integrated below text -->
  <g transform="translate(310, 410)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="#25F4EE" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#FE2C55" stroke-width="1.5" opacity="0.5"/>
    <!-- Play triangle -->
    <polygon points="-7,-10 -7,10 10,0" fill="url(#whiteText)"/>
  </g>

  <!-- Tagline -->
  <text x="310" y="475" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="18" font-weight="700"
        fill="#25F4EE" letter-spacing="10" opacity="0.85">MANAGING AGENCY</text>

  <!-- Bottom decorative line -->
  <line x1="180" y1="500" x2="440" y2="500" stroke="#FE2C55" stroke-width="1" opacity="0.3"/>
  <circle cx="310" cy="500" r="3" fill="#25F4EE"/>
</svg>