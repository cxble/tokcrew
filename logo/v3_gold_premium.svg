<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="100%" style="stop-color:#0A0A12"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFC107"/>
      <stop offset="100%" style="stop-color:#FFA000"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#25F4EE"/>
      <stop offset="100%" style="stop-color:#00B8B8"/>
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FE2C55"/>
      <stop offset="100%" style="stop-color:#CC1A3D"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="url(#bg3)"/>

  <!-- Double circle frame -->
  <circle cx="300" cy="300" r="270" fill="none" stroke="url(#goldGrad)" stroke-width="3" opacity="0.5"/>
  <circle cx="300" cy="300" r="258" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.3"/>

  <!-- Top arc text placeholder (curved text effect with individual chars) -->
  <g opacity="0.7">
    <text x="300" y="55" text-anchor="middle" font-family="Helvetica, Arial, sans-serif"
          font-size="14" font-weight="700" fill="#FFD700" letter-spacing="6">★ TIKTOK MANAGING AGENCY ★</text>
  </g>

  <!-- TikTok-style glitch offset layers for TOK -->
  <!-- Cyan back layer -->
  <text x="296" y="345" text-anchor="middle"
        font-family="Arial Black, Helvetica, sans-serif"
        font-size="175" font-weight="900"
        fill="url(#cyanGrad)" opacity="0.4"
        letter-spacing="-4">TOK</text>

  <!-- Pink back layer -->
  <text x="324" y="345" text-anchor="middle"
        font-family="Arial Black, Helvetica, sans-serif"
        font-size="175" font-weight="900"
        fill="url(#pinkGrad)" opacity="0.4"
        letter-spacing="-4">TOK</text>

  <!-- Gold front layer with outline -->
  <text x="310" y="345" text-anchor="middle"
        font-family="Arial Black, Helvetica, sans-serif"
        font-size="175" font-weight="900"
        fill="url(#goldGrad)" stroke="#FFFFFF" stroke-width="2"
        letter-spacing="-4" filter="url(#glow3)">TOK</text>

  <!-- TikTok music note as the dot of no-existing-letter, positioned creatively -->
  <g transform="translate(310, 160)">
    <!-- Eighth note shape -->
    <path d="M -2 -30 L -2 15 Q -2 22 -9 24 Q -18 26 -22 18 Q -26 8 -18 0 Q -10 -6 -2 0 L -2 -25 L 14 -30 L 14 -35 L -2 -35 Z"
          fill="url(#cyanGrad)" opacity="0.9"/>
    <path d="M 1 -27 L 1 18 Q 1 25 -6 27 Q -15 29 -19 21 Q -23 11 -15 3 Q -7 -3 1 3 L 1 -22 L 17 -27 L 17 -32 L 1 -32 Z"
          fill="url(#pinkGrad)" opacity="0.7"/>
  </g>

  <!-- Decorative wings/sparkles on sides -->
  <g opacity="0.6">
    <polygon points="120,300 140,290 140,310" fill="url(#cyanGrad)"/>
    <polygon points="100,300 115,293 115,307" fill="url(#cyanGrad)" opacity="0.5"/>
    <polygon points="480,300 460,290 460,310" fill="url(#pinkGrad)"/>
    <polygon points="500,300 485,293 485,307" fill="url(#pinkGrad)" opacity="0.5"/>
  </g>

  <!-- Tagline -->
  <text x="300" y="420" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="16" font-weight="700"
        fill="#FFD700" letter-spacing="8" opacity="0.85">YOUR BRAND MATTERS</text>

  <!-- Bottom flourish -->
  <g opacity="0.5">
    <line x1="200" y1="445" x2="280" y2="445" stroke="url(#goldGrad)" stroke-width="1"/>
    <line x1="320" y1="445" x2="400" y2="445" stroke="url(#goldGrad)" stroke-width="1"/>
    <circle cx="300" cy="445" r="3" fill="#FFD700"/>
  </g>

  <!-- Bottom text -->
  <text x="300" y="475" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="12" font-weight="600"
        fill="#FFFFFF" letter-spacing="4" opacity="0.4">EST. 2024</text>

  <!-- Corner sparkles -->
  <g opacity="0.4">
    <path d="M 70 70 L 75 65 L 80 70 L 75 75 Z" fill="#FFD700"/>
    <path d="M 520 70 L 525 65 L 530 70 L 525 75 Z" fill="#FFD700"/>
    <path d="M 70 530 L 75 525 L 80 530 L 75 535 Z" fill="#FFD700"/>
    <path d="M 520 530 L 525 525 L 530 530 L 525 535 Z" fill="#FFD700"/>
  </g>
</svg>