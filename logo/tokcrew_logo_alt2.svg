<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <!-- TOKcrew Wordmark — Variant 3: Neon Outline -->
  <!-- Outlined wordmark with TikTok glitch colors, no fill -->

  <!-- Cyan outline offset -->
  <text x="62" y="280" font-family="Arial Black, Helvetica, sans-serif"
        font-size="220" font-weight="900" fill="none" stroke="#25F4EE"
        stroke-width="3" letter-spacing="-10">TOKcrew</text>

  <!-- Pink outline offset -->
  <text x="68" y="284" font-family="Arial Black, Helvetica, sans-serif"
        font-size="220" font-weight="900" fill="none" stroke="#FE2C55"
        stroke-width="3" letter-spacing="-10">TOKcrew</text>

  <!-- White main outline -->
  <text x="65" y="282" font-family="Arial Black, Helvetica, sans-serif"
        font-size="220" font-weight="900" fill="none" stroke="#FFFFFF"
        stroke-width="4" letter-spacing="-10">TOKcrew</text>

  <!-- Black inner fill for contrast -->
  <text x="65" y="282" font-family="Arial Black, Helvetica, sans-serif"
        font-size="220" font-weight="900" fill="#0A0A0A"
        letter-spacing="-10">TOKcrew</text>

  <!-- "crew" portion gets cyan fill to differentiate -->
  <rect x="590" y="100" width="500" height="220" fill="none"/>
  <text x="65" y="282" font-family="Arial Black, Helvetica, sans-serif"
        font-size="220" font-weight="900" fill="#0A0A0A"
        letter-spacing="-10">TOK</text>
  <text x="595" y="282" font-family="Arial Black, Helvetica, sans-serif"
        font-size="140" font-weight="900" fill="#25F4EE"
        letter-spacing="-4">crew</text>

  <!-- Sound wave bars above -->
  <g opacity="0.7">
    <rect x="200" y="40" width="6" height="30" rx="3" fill="#25F4EE"/>
    <rect x="215" y="25" width="6" height="60" rx="3" fill="#25F4EE"/>
    <rect x="230" y="35" width="6" height="40" rx="3" fill="#FE2C55"/>
    <rect x="245" y="20" width="6" height="70" rx="3" fill="#25F4EE"/>
    <rect x="260" y="30" width="6" height="50" rx="3" fill="#FE2C55"/>
    <rect x="275" y="38" width="6" height="34" rx="3" fill="#25F4EE"/>
  </g>

  <!-- Sound wave bars below right -->
  <g opacity="0.7">
    <rect x="800" y="340" width="6" height="30" rx="3" fill="#FE2C55"/>
    <rect x="815" y="335" width="6" height="40" rx="3" fill="#25F4EE"/>
    <rect x="830" y="345" width="6" height="20" rx="3" fill="#FE2C55"/>
    <rect x="845" y="330" width="6" height="50" rx="3" fill="#25F4EE"/>
    <rect x="860" y="340" width="6" height="30" rx="3" fill="#FE2C55"/>
  </g>

  <!-- Dot accent -->
  <circle cx="550" cy="200" r="8" fill="#FE2C55"/>
  <circle cx="550" cy="200" r="4" fill="#25F4EE"/>
</svg>